name: meetmid_flutter
description: "MeetMid - 만남의 중간 지점 찾기"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Maps & Location
  google_maps_flutter: ^2.12.1
  geolocator: ^13.0.2

  # UI
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Storage
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
