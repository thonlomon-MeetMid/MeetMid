<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetMid - 장소 추천</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px rgba(79,142,247,0.12);
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 720px;
      overflow: hidden;
    }

    /* 헤더 */
    .header {
      background: linear-gradient(135deg, #4f8ef7, #2e5fac);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text { color: white; }
    .logo-text h1 { font-size: 18px; font-weight: 700; }
    .logo-text p { font-size: 11px; opacity: 0.8; margin-top: 1px; }

    .clear-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: rgba(255,255,255,0.3); }

    /* 채팅 영역 */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #aaa;
      gap: 12px;
      text-align: center;
    }
    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* 채팅 버블 */
    .chat-block { display: flex; flex-direction: column; gap: 8px; }

    .bubble-user {
      align-self: flex-end;
      background: #4f8ef7;
      color: white;
      padding: 10px 16px;
      border-radius: 16px 16px 4px 16px;
      font-size: 14px;
      max-width: 80%;
      line-height: 1.5;
    }

    .bubble-bot {
      align-self: flex-start;
      max-width: 95%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bot-label {
      font-size: 11px;
      color: #aaa;
      margin-left: 4px;
    }

    /* 장소 카드 */
    .place-card {
      background: #f8faff;
      border: 1.5px solid #e0eaff;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      color: #222;
      line-height: 1.6;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .place-card:hover {
      border-color: #4f8ef7;
      box-shadow: 0 2px 10px rgba(79,142,247,0.13);
    }

    .card-header {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
    }
    .card-num {
      font-weight: 700;
      color: #4f8ef7;
      font-size: 15px;
      min-width: 20px;
    }
    .card-name {
      font-weight: 700;
      color: #1a1a1a;
      font-size: 15px;
    }

    .card-address {
      color: #777;
      font-size: 12px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-rating {
      font-size: 13px;
      color: #f5a623;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-desc {
      color: #555;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .map-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: #fee500;
      color: #3c1e1e;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }
    .map-btn:hover {
      background: #fdd800;
      transform: translateY(-1px);
    }

    /* 에러 메시지 */
    .error-card {
      align-self: flex-start;
      background: #fff4f4;
      border: 1.5px solid #ffd0d0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #c0392b;
      max-width: 90%;
    }

    /* 로딩 */
    .loading-bubble {
      align-self: flex-start;
      background: #f0f4ff;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #888;
    }
    .dots span { animation: blink 1.2s infinite; display: inline-block; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* 입력창 */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
      background: white;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #dde6ff;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      background: #f8faff;
    }
    input[type="text"]:focus { border-color: #4f8ef7; background: white; }
    .send-btn {
      padding: 12px 20px;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .send-btn:hover { background: #3a7ae0; }
    .send-btn:disabled { background: #aac4f5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">📍</div>
        <div class="logo-text">
          <h1>MeetMid</h1>
          <p>AI 장소 추천 서비스</p>
        </div>
      </div>
      <button class="clear-btn" onclick="clearChat()">대화 초기화</button>
    </div>

    <!-- 채팅 영역 -->
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="icon">🗺️</div>
        <p>어디로 갈지 고민되시나요?<br>장소를 검색하면 AI가 추천해드려요!</p>
        <p style="font-size:12px; color:#ccc;">예: 강남역 근처 카페, 홍대 데이트 코스</p>
      </div>
    </div>

    <!-- 입력창 -->
    <div class="input-area">
      <input type="text" id="query" placeholder="장소를 검색해보세요..." />
      <button class="send-btn" id="btn" onclick="search()">추천받기</button>
    </div>
  </div>

  <script>
    document.getElementById("query").addEventListener("keydown", function(e) {
      if (e.key === "Enter") search();
    });

    // 별점 숫자 → 별 아이콘 문자열로 변환
    function renderStars(ratingStr) {
      const rating = parseFloat(ratingStr);
      if (isNaN(rating)) return ratingStr;
      const full = Math.floor(rating);
      const half = (rating - full) >= 0.5;
      const empty = 5 - full - (half ? 1 : 0);
      return '⭐'.repeat(full) + (half ? '✨' : '') + '☆'.repeat(empty) + `  ${rating}`;
    }

    // 카카오맵 링크 생성 (장소명 + 주소)
    function buildKakaoUrl(name, address) {
      const q = encodeURIComponent(name + ' ' + address);
      return `https://map.kakao.com/link/search/${q}`;
    }

    async function search() {
      const input = document.getElementById("query");
      const query = input.value.trim();
      const chatArea = document.getElementById("chatArea");
      const btn = document.getElementById("btn");
      const emptyState = document.getElementById("emptyState");

      if (!query) return;

      if (emptyState) emptyState.remove();

      // 사용자 버블
      const userBubble = document.createElement("div");
      userBubble.className = "bubble-user";
      userBubble.textContent = query;
      chatArea.appendChild(userBubble);

      // 로딩
      const loadingEl = document.createElement("div");
      loadingEl.className = "loading-bubble";
      loadingEl.innerHTML = '추천 장소 찾는 중 <span class="dots"><span>.</span><span>.</span><span>.</span></span>';
      chatArea.appendChild(loadingEl);

      input.value = "";
      btn.disabled = true;
      chatArea.scrollTop = chatArea.scrollHeight;

      try {
        const res = await fetch("/recommend", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query })
        });
        const data = await res.json();
        loadingEl.remove();

        if (data.error) {
          const errCard = document.createElement("div");
          errCard.className = "error-card";
          errCard.textContent = data.error;
          chatArea.appendChild(errCard);
          return;
        }

        // 봇 응답 블록
        const botBlock = document.createElement("div");
        botBlock.className = "bubble-bot";

        const label = document.createElement("div");
        label.className = "bot-label";
        label.textContent = "MeetMid AI 추천";
        botBlock.appendChild(label);

        // 형식: 1. [장소명] | [주소] | [별점] | [한 줄 설명]
        const lines = data.result.trim().split("\n").filter(l => l.trim());
        let hasCard = false;

        lines.forEach(line => {
          const match = line.match(/^(\d+)\.\s*\[?(.+?)\]?\s*\|\s*\[?(.+?)\]?\s*\|\s*\[?([\d.]+)\]?\s*\|\s*\[?(.+?)\]?\s*$/);
          if (match) {
            hasCard = true;
            const num = match[1];
            const name = match[2].trim();
            const address = match[3].trim();
            const rating = match[4].trim();
            const desc = match[5].trim();
            const kakaoUrl = buildKakaoUrl(name, address);

            const card = document.createElement("div");
            card.className = "place-card";
            card.innerHTML = `
              <div class="card-header">
                <span class="card-num">${num}.</span>
                <span class="card-name">${escapeHtml(name)}</span>
              </div>
              <div class="card-address">📌 ${escapeHtml(address)}</div>
              <div class="card-rating">${renderStars(rating)}</div>
              <div class="card-desc">${escapeHtml(desc)}</div>
              <a class="map-btn" href="${kakaoUrl}" target="_blank" rel="noopener">
                🗺️ 카카오맵에서 보기
              </a>
            `;
            botBlock.appendChild(card);
          }
        });

        // 파싱 실패 시 원문 텍스트로 폴백
        if (!hasCard) {
          const fallback = document.createElement("div");
          fallback.className = "place-card";
          fallback.style.whiteSpace = "pre-wrap";
          fallback.textContent = data.result;
          botBlock.appendChild(fallback);
        }

        chatArea.appendChild(botBlock);
      } catch (e) {
        loadingEl.remove();
        const errCard = document.createElement("div");
        errCard.className = "error-card";
        errCard.textContent = "오류가 발생했습니다. 다시 시도해주세요.";
        chatArea.appendChild(errCard);
      } finally {
        btn.disabled = false;
        chatArea.scrollTop = chatArea.scrollHeight;
        input.focus();
      }
    }

    async function clearChat() {
      await fetch("/clear", { method: "POST" });
      const chatArea = document.getElementById("chatArea");
      chatArea.innerHTML = `
        <div class="empty-state" id="emptyState">
          <div class="icon">🗺️</div>
          <p>어디로 갈지 고민되시나요?<br>장소를 검색하면 AI가 추천해드려요!</p>
          <p style="font-size:12px; color:#ccc;">예: 강남역 근처 카페, 홍대 데이트 코스</p>
        </div>`;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
